services:
  app:
    build: .
    restart: always
    ports:
      - 3000:3000
    env_file: .env
    depends_on:
      db:
        condition: service_started
  db:
    image: postgres
    restart: always
    ports:
      - 5433:5432
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: local
    volumes:
      - pgdata:/var/lib/postgresql
volumes:
  pgdata:
